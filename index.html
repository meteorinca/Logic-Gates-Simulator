<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Interactive Logic Gates Simulator — build AND, OR, NOT, XOR, NOR circuits and more with wires and real-time signal propagation.">
    <link rel="icon" href="https://img.icons8.com/ios-filled/50/3b6ef0/logic-data-types.png" type="image/png">

    <title>Logic Gates Simulator</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div id="appWrap">
      <canvas id="circuits-canvas" width="1000" height="800">Canvas is not supported in your browser</canvas>

      <!-- Delete zone indicator -->
      <div id="deleteBtn">&times;</div>

      <!-- Add gate menu -->
      <div id="addBtn">+</div>
      <div id="addDropdown"></div>

      <!-- Import / Export (bottom-left) -->
      <div id="importBtn" title="Import circuit from JSON"><i class="material-icons">file_download</i></div>
      <div id="exportBtn" title="Export circuit to clipboard"><i class="material-icons">file_upload</i></div>

      <!-- Examples panel trigger -->
      <div id="examplesBtn" title="Load example circuit">
        <i class="material-icons" style="font-size:20px;line-height:52px;">auto_awesome</i>
      </div>

      <!-- Tutorial panel trigger -->
      <div id="learnBtn" title="Interactive tutorials">
        <i class="material-icons" style="font-size:22px;line-height:52px;">school</i>
      </div>

      <!-- Play / Pause (bottom-right, left of theme) -->
      <div id="playPauseBtn" title="Pause simulation">
        <i class="material-icons" id="playPauseIcon" style="font-size:22px;line-height:52px;">pause</i>
      </div>

      <!-- Theme toggle (bottom-right corner) -->
      <div id="themeBtn" title="Toggle dark mode">
        <i class="material-icons" id="themeIcon" style="font-size:22px;line-height:52px;">dark_mode</i>
      </div>

      <!-- Examples panel -->
      <div id="examplesPanel">
        <div class="panel-header">
          <span class="panel-header-icon">⚡</span>
          <h3>Examples</h3>
          <span class="panel-header-sub">click to load</span>
        </div>
        <div class="examples-list" id="examplesList"></div>
      </div>

      <!-- Tutorial panel -->
      <div id="learnPanel">
        <div class="panel-header">
          <span class="panel-header-icon" style="color:var(--neon-cyan)">🎓</span>
          <select id="learnTOC" title="Select a lesson"></select>
        </div>
        <div id="learnProgressBar"><div id="learnProgress"></div></div>
        <div class="panel-content" id="learnContent"></div>
        <div class="panel-footer">
          <button id="learnBackBtn" class="learn-footer-btn" title="Previous Slide">◀</button>
          <button id="learnResetBtn" class="learn-footer-btn reset" title="Reset Circuit">Reset</button>
          <button id="learnNextBtn" class="learn-footer-btn active-next" title="Next Slide">Next ➔</button>
        </div>
      </div>

      <!-- Paused banner -->
      <div id="pauseBanner">⏸ SIMULATION PAUSED</div>

      <!-- Hint text -->
      <div id="instructionsHint">drag outputs → inputs &nbsp;·&nbsp; drag canvas to pan &nbsp;·&nbsp; drop on ✕ to delete</div>

      <!-- Welcome toast -->
      <div id="welcomeToast">⚡ Logic Gates Simulator &nbsp;·&nbsp; Try an example from the ✦ menu!</div>
    </div>

    <!-- Particle effect canvas -->
    <canvas id="particleCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.18.2/TweenMax.min.js"></script>
    <script src="https://code.createjs.com/easeljs-0.8.2.min.js"></script>
    <script src="script.js"></script>
    <script src="tutorials.js"></script>
  </body>
</html>
